<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen UD7: Pensamiento Computacional y Algoritmos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        /* Contenedor del Formulario */
        #iframe-container {
            width: 100%;
            height: 100%;
            display: block;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        /* Pantalla de Bloqueo Alerta */
        #bloqueo {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(218, 56, 56, 0.98);
            color: white;
            z-index: 9999;
            text-align: center;
            justify-content: center;
            align-content: center;
            flex-direction: column;
            padding: 20px;
        }
        #bloqueo h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        #bloqueo p {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }
        #bloqueo button {
            background-color: white;
            color: #da3838;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        #bloqueo button:hover {
            background-color: #f0f0f0;
        }
        /* Marcador flotante de avisos en esquina */
        #contador-flotante {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background-color: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: bold;
            pointer-events: none;
            z-index: 999;
            border: 1px solid #da3838;
        }
    </style>
</head>
<body>

    <div id="contador-flotante">Avisos de salida: <span id="num-avisos">0</span></div>

    <div id="iframe-container">
        <iframe id="examen-frame" src="https://docs.google.com/forms/d/e/1FAIpQLScoD_YB2wQ3IUqnWM4BaC-nqGwQ2Vm7f-cnU29Rbl99IahZkw/viewform?embedded=true">
            Cargando cuestionario...
        </iframe>
    </div>

    <div id="bloqueo">
        <h1>¡ACCIÓN NO PERMITIDA!</h1>
        <p>Has salido de la pantalla del examen para usar otra pestaña o aplicación.<br>
        Esta acción queda registrada en el almacenamiento local del equipo.</p>
        <p style="font-size: 1.6rem; font-weight: bold; background: rgba(0,0,0,0.2); padding: 10px; display: inline-block; border-radius: 5px;">
            Total de faltas acumuladas: <span id="alert-contador">0</span>
        </p>
        <div style="margin-top: 30px;">
            <button onclick="desbloquearExamen()">Volver al examen</button>
        </div>
    </div>

    <script>
        // Recuperar faltas anteriores si el alumno ha refrescado la página (F5)
        let contadorSalidas = parseInt(localStorage.getItem('faltasExamenUD7')) || 0;
        
        const pantallaBloqueo = document.getElementById('bloqueo');
        const txtNumAvisos = document.getElementById('num-avisos');
        const txtAlertContador = document.getElementById('alert-contador');

        // Mostrar el estado inicial al cargar la página
        actualizarContadores();

        // Si el alumno ya tenía el examen bloqueado antes de refrescar, se le vuelve a mostrar el bloqueo
        if (sessionStorage.getItem('examenBloqueado') === 'true') {
            mostrarBloqueo();
        }

        // 1. DETECTAR CAMBIO DE PESTAÑA O MINIMIZACIÓN
        document.addEventListener("visibilitychange", function() {
            if (document.hidden) {
                registrarFalta();
            }
        });

        // 2. DETECTAR SI ABREN OTRA VENTANA O APP (Pérdida de foco del navegador)
        window.addEventListener("blur", function() {
            setTimeout(() => {
                if (document.activeElement !== document.getElementById('examen-frame') && !document.hidden) {
                    registrarFalta();
                }
            }, 200);
        });

        // 3. EVITAR TENTATIVAS DE REFRESCAR FÁCILMENTE (Aviso nativo del navegador)
        window.addEventListener("beforeunload", function (e) {
            // Esto muestra el cuadro de diálogo estándar: "¿Desea salir de este sitio web?"
            e.preventDefault();
            e.returnValue = '';
        });

        function registrarFalta() {
            contadorSalidas++;
            localStorage.setItem('faltasExamenUD7', contadorSalidas); // Guardado permanente en el PC
            sessionStorage.setItem('examenBloqueado', 'true'); // Recuerda que estaba en pantalla roja
            actualizarContadores();
            mostrarBloqueo();
        }

        function mostrarBloqueo() {
            pantallaBloqueo.style.display = 'flex';
        }

        function desbloquearExamen() {
            pantallaBloqueo.style.display = 'none';
            sessionStorage.setItem('examenBloqueado', 'false');
        }

        function actualizarContadores() {
            txtNumAvisos.innerText = contadorSalidas;
            txtAlertContador.innerText = contadorSalidas;
        }
    </script>
</body>
</html>
